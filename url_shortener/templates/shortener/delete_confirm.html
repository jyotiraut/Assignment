{% extends "base.html" %}

{% block content %}
<h3>Confirm Delete</h3>

<p>Are you sure you want to delete this short URL?</p>

<p><strong>{{ request.get_host }}/{{ url.short_key }}</strong></p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Yes, Delete</button>
    <a href="/">Cancel</a>
</form>
{% endblock %}
